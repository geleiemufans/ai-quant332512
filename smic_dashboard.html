// --- Statistics ---
const last = rawData[rawData.length-1];
const first = rawData[0];
const pctChg = ((last.close - first.close) / first.close * 100).toFixed(2);
const highs = rawData.map(d => d.high);
const lows = rawData.map(d => d.low);
const maxHigh = Math.max(...highs);
const minLow = Math.min(...lows);
const avgVol = Math.round(rawData.reduce((s, d) => s + d.vol, 0) / rawData.length);

document.getElementById('lastClose').textContent = '¥' + last.close.toFixed(2);
document.getElementById('yearChange').textContent = pctChg + '%';
document.getElementById('yearChange').className = 'value ' + (pctChg >= 0 ? 'up' : 'down');
document.getElementById('yearHigh').textContent = '¥' + maxHigh.toFixed(2);
document.getElementById('yearLow').textContent = '¥' + minLow.toFixed(2);
document.getElementById('avgVol').textContent = (avgVol / 10000).toFixed(1) + '万';

// --- ECharts ---
const klineChart = echarts.init(document.getElementById('klineChart'));
const volumeChart = echarts.init(document.getElementById('volumeChart'));

function calcMA(dataArr, days) {
  const result = [];
  for (let i = 0; i < dataArr.length; i++) {
    if (i < days - 1) { result.push('-'); continue; }
    let sum = 0;
    for (let j = i - days + 1; j <= i; j++) sum += dataArr[j];
    result.push(+(sum / days).toFixed(2));
  }
  return result;
}

function buildOption(range) {
  // Filter data by range
  let endIdx = rawData.length - 1;
  let startIdx = 0;
  if (range === '1m') startIdx = Math.max(0, endIdx - 21);
  else if (range === '3m') startIdx = Math.max(0, endIdx - 63);
  else if (range === '6m') startIdx = Math.max(0, endIdx - 126);
  const data = rawData.slice(startIdx, endIdx + 1);

  const dates = data.map(d => d.date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3'));
  const kData = data.map(d => [d.open, d.close, d.low, d.high]);
  const volumes = data.map(d => d.vol);
  
  const closePrices = data.map(d => d.close);
  const ma5 = calcMA(closePrices, 5);
  const ma10 = calcMA(closePrices, 10);
  const ma20 = calcMA(closePrices, 20);

  const showMA5 = document.getElementById('ma5').checked;
  const showMA10 = document.getElementById('ma10').checked;
  const showMA20 = document.getElementById('ma20').checked;

  const series = [
    {
      name: 'K线',
      type: 'candlestick',
      data: kData,
      itemStyle: {
        color: '#e74c3c',
        color0: '#27ae60',
        borderColor: '#e74c3c',
        borderColor0: '#27ae60'
      },
      markLine: {
        silent: true,
        symbol: 'none',
        data: [
          { yAxis: maxHigh, label: { formatter: '最高 ¥' + maxHigh.toFixed(2), position: 'insideEndTop' }, lineStyle: { color: '#999', type: 'dashed' } },
          { yAxis: minLow, label: { formatter: '最低 ¥' + minLow.toFixed(2), position: 'insideEndBottom' }, lineStyle: { color: '#999', type: 'dashed' } }
        ]
      }
    }
  ];

  if (showMA5) series.push({ name: 'MA5', type: 'line', data: ma5, smooth: true, lineStyle: { width: 1.5, color: '#f39c12' }, symbol: 'none' });
  if (showMA10) series.push({ name: 'MA10', type: 'line', data: ma10, smooth: true, lineStyle: { width: 1.5, color: '#3498db' }, symbol: 'none' });
  if (showMA20) series.push({ name: 'MA20', type: 'line', data: ma20, smooth: true, lineStyle: { width: 1.5, color: '#9b59b6' }, symbol: 'none' });

  return {
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      backgroundColor: 'rgba(255,255,255,0.95)',
      borderColor: '#ddd',
      borderWidth: 1,
      textStyle: { color: '#333', fontSize: 12 },
      formatter: function(params) {
        const p = params[0];
        if (!p) return '';
        const idx = p.dataIndex;
        const d = data[idx];
        if (!d) return '';
        const up = d.close >= d.open;
        const color = up ? '#e74c3c' : '#27ae60';
        const chg = ((d.close - d.pre_close) / d.pre_close * 100);
        const chgStr = chg >= 0 ? '+' + chg.toFixed(2) + '%' : chg.toFixed(2) + '%';
        return `<div style="font-weight:600;margin-bottom:4px">${dates[idx]}</div>
          <div>开盘: <b>${d.open.toFixed(2)}</b></div>
          <div>收盘: <b style="color:${color}">${d.close.toFixed(2)}</b></div>
          <div>最高: <b>${d.high.toFixed(2)}</b></div>
          <div>最低: <b>${d.low.toFixed(2)}</b></div>
          <div>成交量: <b>${(d.vol/10000).toFixed(0)}万手</b></div>`;
      }
    },
    grid: { left: '3%', right: '3%', top: '8%', bottom: '2%', containLabel: true },
    xAxis: { type: 'category', data: dates, axisLine: { lineStyle: { color: '#ddd' } }, axisLabel: { fontSize: 10, rotate: 30 } },
    yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: '¥{value}' } },
    dataZoom: [
      { type: 'inside', start: 0, end: 100 },
      { type: 'slider', top: '88%', height: 20, borderColor: '#ddd', fillerColor: 'rgba(26,26,46,0.1)', handleStyle: { color: '#1a1a2e' } }
    ],
    series: series
  };
}

function buildVolumeOption(range) {
  let endIdx = rawData.length - 1;
  let startIdx = 0;
  if (range === '1m') startIdx = Math.max(0, endIdx - 21);
  else if (range === '3m') startIdx = Math.max(0, endIdx - 63);
  else if (range === '6m') startIdx = Math.max(0, endIdx - 126);
  const data = rawData.slice(startIdx, endIdx + 1);
  const dates = data.map(d => d.date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3'));
  const volColors = data.map(d => d.close >= d.open ? '#e74c3c' : '#27ae60');
  const volData = data.map(d => d.vol);

  return {
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'shadow' },
      backgroundColor: 'rgba(255,255,255,0.95)',
      borderColor: '#ddd',
      borderWidth: 1,
      textStyle: { color: '#333', fontSize: 12 },
      formatter: function(params) {
        const p = params[0];
        if (!p) return '';
        const idx = p.dataIndex;
        const d = data[idx];
        return `<div style="font-weight:600">${dates[idx]}</div>
          <div>成交量: <b>${(d.vol/10000).toFixed(0)}万手</b></div>
          <div>成交额: <b>¥${(d.vol * d.close / 10000).toFixed(2)}亿</b></div>`;
      }
    },
    grid: { left: '3%', right: '3%', top: '8%', bottom: '2%', containLabel: true },
    xAxis: { type: 'category', data: dates, axisLine: { show: false }, axisLabel: { show: false } },
    yAxis: { type: 'value', splitLine: { lineStyle: { color: '#f0f0f0' } }, axisLabel: { formatter: v => (v/10000).toFixed(0) + '万' } },
    series: [{
      type: 'bar',
      data: volData.map((v, i) => ({ value: v, itemStyle: { color: volColors[i] } })),
      barWidth: '60%'
    }]
  };
}

let currentRange = '1y';

function renderAll() {
  klineChart.setOption(buildOption(currentRange), true);
  volumeChart.setOption(buildVolumeOption(currentRange), true);
}

// --- Event Listeners ---
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentRange = this.dataset.range;
    renderAll();
  });
});

document.querySelectorAll('.ma-toggle input').forEach(cb => {
  cb.addEventListener('change', renderAll);
});

// Responsive
window.addEventListener('resize', () => { klineChart.resize(); volumeChart.resize(); });

// Init
renderAll();
</script>
